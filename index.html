<body>
    <div id="app">
        <!-- Skeleton loader: se destruye automáticamente al primer render de app.js -->
        <div id="initial-loader" style="
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-body, #F0F4F8);
            flex-direction: column; gap: 16px;
            font-family: 'Inter', system-ui, sans-serif;
        ">
            <img src="Favicon logo magic design efecto.png" alt="Logo"
                 style="width: 64px; height: 64px; animation: pulse-logo 1.8s ease-in-out infinite;">
            <div style="font-size: 0.9rem; color: #64748B; font-weight: 500;">
                Cargando Magic CRM...
            </div>
            <div style="
                width: 180px; height: 4px; background: #E2E8F0;
                border-radius: 4px; overflow: hidden;
            ">
                <div style="
                    width: 40%; height: 100%;
                    background: linear-gradient(90deg, #3B82F6, #60A5FA);
                    border-radius: 4px;
                    animation: loading-bar 1.5s ease-in-out infinite;
                "></div>
            </div>
        </div>
        <style>
            @keyframes loading-bar {
                0% { transform: translateX(-100%); }
                50% { transform: translateX(150%); }
                100% { transform: translateX(-100%); }
            }
            @keyframes pulse-logo {
                0%, 100% { opacity: 1; transform: scale(1); }
                50% { opacity: 0.7; transform: scale(0.95); }
            }
        </style>
    </div>

    <!-- SPA Path Restoration (recibe ruta desde 404.html) -->
    <script>
        (function () {
            // Guardar la base path REAL antes de cualquier modificación
            // Ejemplo: /magic-crm-ultra/ o /Magic-CRM-Pro-Ver-01-main/
            var pathname = window.location.pathname;
            // Remover index.html si está presente
            pathname = pathname.replace(/index\.html$/, '');
            // Asegurar que termina con /
            if (!pathname.endsWith('/')) pathname += '/';
            window.__SPA_BASE = pathname;

            var params = new URLSearchParams(window.location.search);
            var p = params.get('p');
            if (p) {
                // Restaurar la URL limpia original CON el base path
                var base = window.__SPA_BASE.replace(/\/$/, '');
                var restored = base + p + (params.get('q') ? '?' + decodeURIComponent(params.get('q')) : '') + window.location.hash;
                window.history.replaceState(null, '', restored);
            }
        })();
    </script>

    <script type="module" src="js/app.js"></script>
</body>


</html>
